name: Deploy to AWS Lambda

# Triggers on version tags pushed to master (e.g. v1.2.3)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: scrappy-api

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Quality gate — tests and linting
  # -----------------------------------------------------------------------
  test:
    name: Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

  # -----------------------------------------------------------------------
  # Job 2: Build with SAM and deploy to Lambda
  # -----------------------------------------------------------------------
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # Required for OIDC authentication with AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build TypeScript
        run: npm run build

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: sam deploy --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Print deployed version
        run: echo "Deployed ${{ github.ref_name }} to Lambda (${{ env.LAMBDA_FUNCTION_NAME }})"
