name: Deploy to AWS Lambda

# Triggers on version tags pushed to master (e.g. v1.2.3)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: scrappy-backend
  LAMBDA_FUNCTION_NAME: scrappy-backend

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Quality gate — tests, linting, type checking
  # -----------------------------------------------------------------------
  test:
    name: Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app/

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=term-missing

  # -----------------------------------------------------------------------
  # Job 2: Build Docker image, push to ECR, update Lambda
  # -----------------------------------------------------------------------
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # Required for OIDC authentication with AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ steps.build-image.outputs.image }}

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Print deployed image
        run: echo "Deployed ${{ steps.build-image.outputs.image }} to Lambda"
