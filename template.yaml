AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Scrappy Backend — NestJS Auth API (Lambda + API Gateway HTTP)

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: production
        DATABASE_URL: '{{resolve:ssm:/scrappy/database-url}}'
        JWT_SECRET: '{{resolve:ssm:/scrappy/jwt-secret}}'
        JWT_REFRESH_SECRET: '{{resolve:ssm:/scrappy/jwt-refresh-secret}}'
        SES_FROM_EMAIL: '{{resolve:ssm:/scrappy/ses-from-email}}'
        FRONTEND_URL: '{{resolve:ssm:/scrappy/frontend-url}}'
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'

Resources:
  ScrappyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: scrappy-api
      CodeUri: .
      Handler: dist/lambda.handler
      Description: Scrappy NestJS API handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref ScrappyHttpApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        Sourcemap: false
        EntryPoints:
          - src/lambda.ts
        External:
          - '@aws-sdk/client-ses'
          - '@prisma/client'
          - '@prisma/adapter-pg'
          - pg

  ScrappyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      CorsConfiguration:
        AllowOrigins:
          - '{{resolve:ssm:/scrappy/frontend-url}}'
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowCredentials: true

Outputs:
  ApiUrl:
    Description: API Gateway HTTP API endpoint URL
    Value: !Sub 'https://${ScrappyHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt ScrappyApiFunction.Arn
